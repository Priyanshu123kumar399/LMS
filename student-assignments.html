<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Assignments</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <style>
    body { background:#f5f7fb; }
    .cardx { background:#fff; border-radius:18px; box-shadow: 0 6px 18px rgba(0,0,0,.06); }
    .pill { display:inline-block; padding:6px 12px; border-radius:999px; background:#eef2ff; color:#1d4ed8; font-weight:600; font-size:13px;}
    .table thead th { color:#6b7280; font-weight:700; font-size:13px; border-bottom:1px solid #eef2f7; }
    .table td { vertical-align:middle; }
    .btn-soft { border:1px solid #e5e7eb; background:#fff; }
    .muted { color:#6b7280; }
    .badge-soft { background:#eef2ff; color:#1d4ed8; }
  </style>
</head>
<body class="p-4">

  <div class="container">
    <div class="cardx p-4">
      <span class="pill">Assignments</span>
      <h2 class="mt-2 mb-4">Your Assignments</h2>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Title</th>
              <th>Due</th>
              <th>Status</th>
              <th>Submitted On</th>
              <th>Marks</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="cardx p-4 mt-4" style="box-shadow:none;border:1px solid #eef2f7;">
        <h4 class="mb-1">Submit Assignment</h4>
        <p class="muted mb-3">Select an assignment from the table.</p>

        <div class="mb-3">
          <div class="muted mb-1">Selected:</div>
          <div id="selectedTitle" class="fw-semibold">—</div>
          <div id="selectedQuestion" class="muted mt-1">—</div>
        </div>

        <div class="mb-3">
          <input id="fileInput" type="file" class="form-control">
          <div id="fileHint" class="muted mt-2"></div>
        </div>

        <div class="d-flex gap-2">
          <button id="submitBtn" class="btn btn-primary" disabled>Submit</button>
          <button id="clearBtn" class="btn btn-soft">Clear</button>
        </div>

        <div id="submitStatus" class="mt-3"></div>
      </div>
    </div>
  </div>

</body>
</html>
