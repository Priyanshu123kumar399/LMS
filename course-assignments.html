<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Course Assignment</title>

  <link rel="stylesheet" href="css/bootstrap.min.css">

  <style>
    body { background:#f5f7fb; }
    .cardx { background:#fff; border-radius:18px; box-shadow: 0 6px 18px rgba(0,0,0,.06); padding:20px; }
    .pill { padding:6px 12px; border-radius:999px; background:#eef2ff; color:#1d4ed8; }
    .question-box { background:#f9fafb; padding:10px; border-radius:10px; margin-top:5px;}
    .btn-space { margin-right:10px; margin-top:10px; }
  </style>
</head>

<body class="p-4">

<div class="container">
  <div class="cardx">

    <span class="pill">Assignments</span>
    <h2 class="mt-2">Your Assignment</h2>

    <p><b>Due Date:</b> 30 April 2026</p>

    <h4>Questions</h4>

    <div class="question-box">
      <b>Q1.</b> Explain Data Communication and its types.
    </div>

    <div class="question-box">
      <b>Q2.</b> Explain OSI Model layers with diagram.
    </div>

    <div class="mt-4">
      <h4>Upload Answer (PDF)</h4>

      <input type="file" id="fileInput" class="form-control mb-2">

      <button id="submitBtn" class="btn btn-primary">Submit</button>

      <p id="submitStatus" class="mt-2"></p>

      <div id="afterOptions" style="display:none;">
        <button onclick="goBack()" class="btn btn-secondary btn-space">Back</button>
        <button onclick="checkStatus()" class="btn btn-info btn-space">Check Status</button>
        <button onclick="uploadAgain()" class="btn btn-warning btn-space">Upload Again</button>
      </div>

    </div>

    <p id="statusText" class="mt-3"></p>

  </div>
</div>

<script src="js/course-assignments.js"></script>

</body>
</html>
